<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="notes">
<title>notes</title>

<style>
/* =========================
   FOUNDATION (clean iOS base)
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}

html, body{
  height:100%;
  width:100%;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  overflow:hidden;
}

body{
  position:fixed;
  inset:0;
  overscroll-behavior:none;
}

/* =========================
   LAYOUT
========================= */

.shell{
  max-width:430px;
  margin:0 auto;
  height:100%;
  display:flex;
  flex-direction:column;
  padding:14px 14px calc(env(safe-area-inset-bottom) + 18px);
}

/* =========================
   HEADER (lighter, quieter)
========================= */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.title{
  font-size:12px;
  letter-spacing:0.12em;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
}

.add{
  background:#121214;
  border:1px solid rgba(255,255,255,0.06);
  color:#fff;
  border-radius:12px;
  padding:8px 14px;
  font-size:12px;
}

.add:active{
  transform:scale(0.96);
  background:#1a1a1d;
}

/* =========================
   GRID (tighter + more iOS density)
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  flex:1;
  overflow-y:auto;
  padding-bottom:10px;
}

.grid::-webkit-scrollbar{ display:none; }

/* =========================
   NOTE (key aesthetic fix)
========================= */

.note{
  aspect-ratio:1;
  background:#121214;
  border:1px solid rgba(255,255,255,0.04);
  border-radius:14px;
  padding:10px;
  font-size:11px;
  line-height:1.35;
  color:rgba(255,255,255,0.88);

  overflow:hidden;
  white-space:pre-wrap;
  word-break:break-word;

  display:flex;
  align-items:flex-start;

  transition:transform 0.12s ease, background 0.12s ease;
}

.note:active{
  transform:scale(0.96);
  background:#1a1a1c;
}

/* subtle fade instead of harsh empty look */
.note.empty{
  color:rgba(255,255,255,0.35);
}

/* =========================
   EDITOR (softer transition feel)
========================= */

.editor{
  display:none;
  position:fixed;
  inset:0;
  background:#000;
  padding:14px;
}

textarea{
  width:100%;
  height:85vh;
  background:#0c0c0e;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:16px;
  padding:14px;
  color:#fff;
  font-size:14px;
  line-height:1.45;
  outline:none;
  resize:none;
}

/* focus is subtle, not bright */
textarea:focus{
  border-color:rgba(255,255,255,0.14);
}

/* =========================
   BUTTON BAR (quieter)
========================= */

.bar{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.bar button{
  flex:1;
  background:#121214;
  border:1px solid rgba(255,255,255,0.06);
  color:#fff;
  border-radius:12px;
  padding:10px;
  font-size:12px;
}

.bar button:active{
  transform:scale(0.96);
  background:#1a1a1d;
}

.bar .danger{
  color:#ff453a;
}

/* =========================
   EMPTY STATE (soft)
========================= */

.empty{
  grid-column:1/-1;
  text-align:center;
  padding:40px 0;
  color:rgba(255,255,255,0.35);
}

.empty span{
  display:block;
  font-size:13px;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="shell">

  <div class="top">
    <div class="title">notes</div>
    <button class="add" onclick="createNote()">+ new</button>
  </div>

  <div id="grid" class="grid"></div>

</div>

<div id="editor" class="editor">
  <textarea id="text" placeholder="write something..."></textarea>

  <div class="bar">
    <button onclick="saveNote()">save</button>
    <button onclick="closeEditor()">close</button>
    <button class="danger" onclick="deleteNote()">delete</button>
  </div>
</div>

<script>
let notes = [];
let activeId = null;

const grid = document.getElementById("grid");
const editor = document.getElementById("editor");
const text = document.getElementById("text");

function load(){
  const data = localStorage.getItem("notes_ios_clean");
  if(data) notes = JSON.parse(data);
  render();
}

function save(){
  localStorage.setItem("notes_ios_clean", JSON.stringify(notes));
}

function render(){
  grid.innerHTML = "";

  if(notes.length === 0){
    grid.innerHTML = `
      <div class="empty">
        empty
        <span>tap + to create a note</span>
      </div>
    `;
    return;
  }

  notes.forEach(n=>{
    const div = document.createElement("div");
    div.className = "note";
    if(!n.text.trim()) div.classList.add("empty");

    div.innerText = n.text.trim().slice(0,90) || "empty";
    div.onclick = ()=>open(n.id);
    grid.appendChild(div);
  });
}

function createNote(){
  const id = Date.now();
  notes.unshift({id, text:""});
  save();
  render();
  open(id);
}

function open(id){
  activeId = id;
  const n = notes.find(x=>x.id===id);
  text.value = n?.text || "";
  editor.style.display = "block";
  text.focus();
}

function saveNote(){
  const n = notes.find(x=>x.id===activeId);
  if(n){
    n.text = text.value;
    save();
    render();
  }
}

function closeEditor(){
  saveNote();
  editor.style.display = "none";
  activeId = null;
}

function deleteNote(){
  notes = notes.filter(x=>x.id!==activeId);
  save();
  editor.style.display = "none";
  render();
}

text.addEventListener("input", ()=>{
  const n = notes.find(x=>x.id===activeId);
  if(n){
    n.text = text.value;
    save();
    render();
  }
});

load();
</script>

</body>
</html>
